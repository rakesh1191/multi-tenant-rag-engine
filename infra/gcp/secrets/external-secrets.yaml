apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: gcp-secrets-manager
spec:
  provider:
    gcpsm:
      projectID: your-gcp-project-id
      auth:
        workloadIdentity:
          clusterLocation: us-central1
          clusterName: rag-prod-cluster
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rag-engine-secrets
  namespace: rag-engine
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secrets-manager
    kind: ClusterSecretStore
  target:
    name: rag-engine-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: rag-engine-prod-database-url
    - secretKey: REDIS_URL
      remoteRef:
        key: rag-engine-prod-redis-url
    - secretKey: SECRET_KEY
      remoteRef:
        key: rag-engine-prod-secret-key
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: rag-engine-prod-anthropic-api-key
