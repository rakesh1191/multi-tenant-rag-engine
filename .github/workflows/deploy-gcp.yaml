name: Deploy to GCP

on:
  push:
    branches: [main]
    paths-ignore:
      - "infra/aws/**"
      - "k8s/overlays/aws/**"
      - "**.md"

env:
  GCP_REGION: us-central1
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_CLUSTER: rag-prod-cluster
  AR_API_REPO: rag-prod-api
  AR_UI_REPO: rag-prod-ui

permissions:
  id-token: write   # OIDC token for GCP Workload Identity Federation
  contents: read

jobs:
  build-and-push:
    name: Build & Push to Artifact Registry
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.tag.outputs.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set image tag
        id: tag
        run: echo "sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_API_REPO }}/api:${{ steps.tag.outputs.sha }}
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_API_REPO }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push UI image
        uses: docker/build-push-action@v5
        with:
          context: ui
          file: Dockerfile.ui
          push: true
          tags: |
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_UI_REPO }}/ui:${{ steps.tag.outputs.sha }}
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_UI_REPO }}/ui:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GCP_REGION }}

      - name: Run database migrations
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_API_REPO }}/api:${{ needs.build-and-push.outputs.image_tag }}"
          kubectl -n rag-engine delete job db-migrate --ignore-not-found
          kubectl -n rag-engine run db-migrate \
            --image="$IMAGE" \
            --restart=Never \
            --overrides='{"spec":{"serviceAccountName":"rag-engine-api"}}' \
            -- alembic upgrade head
          kubectl -n rag-engine wait --for=condition=complete pod/db-migrate --timeout=300s
          kubectl -n rag-engine logs db-migrate

      - name: Deploy with Kustomize
        run: |
          IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
          AR="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}"

          cd k8s/overlays/gcp
          kustomize edit set image \
            rag-engine-api="${AR}/${{ env.AR_API_REPO }}/api:${IMAGE_TAG}" \
            rag-engine-ui="${AR}/${{ env.AR_UI_REPO }}/ui:${IMAGE_TAG}"

          kubectl apply -k .

      - name: Wait for rollout
        run: |
          kubectl -n rag-engine rollout status deployment/rag-engine-api --timeout=300s
          kubectl -n rag-engine rollout status deployment/rag-engine-ui --timeout=300s
          kubectl -n rag-engine rollout status deployment/rag-engine-worker --timeout=300s

      - name: Smoke test
        run: |
          API_IP=$(kubectl -n rag-engine get ingress rag-engine -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          curl -sf "https://${API_IP}/health" -H "Host: api.your-domain.com" | jq .
